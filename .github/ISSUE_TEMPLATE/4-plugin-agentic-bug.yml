name: "Explyt Agent bug"
description: "Any problem in Explyt Agent"
title: "[BUG] "
labels: bug
assignees: []
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting Explyt plugin bug!"
  - type: textarea
    id: details
    attributes:
      label: Problem details
      description: "Describe the problem you faced"
      placeholder: |
        Example:
        - Edit tool failed several times with the same error
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: "Please provide us as more details on how to reproduce this issue, as you can"
      placeholder: |
        Include information about your prompt, used workflows and rules. 
        If your project is open-sourced, show the mentioned code, please, and a link on GitHub.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: "Please attach IDE And Explyt logs"
      placeholder: |
        1) Provide erroneous agentic chat (saved as JSON file with a special button)
        2) Provide IDE logs (Help -> Open Log in Editor)
    validations:
      required: false
  - type: textarea
    id: additional_info
    attributes:
      label: "Additional information"
      description: "Any additional information that can help us to investigate the reported problem"
      placeholder: "Screenshots, videos, etc."
    validations:
      required: false
  - type: textarea
    id: plugin_version
    attributes:
      label: Plugin version
      description: "Type plugin version here"
      placeholder: "Example: 5.0.0-IJ-243-mp"
    validations:
      required: false
  - type: dropdown
    id: llm_provider
    attributes:
      label: LLM provider
      description: "Choose LLM provider"
      options:
        - Explyt Enterprise
        - Explyt
        - Open AI
        - DeepSeek
        - Ollama
        - Another
      default: 0
    validations:
      required: true
  - type: textarea
    id: llm_model
    attributes:
      label: LLM model
      description: "Type LLM model here"
      placeholder: "Default"
    validations:
      required: false
  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: 'Example: context size, source language, etc.'
      placeholder: "Any other information that can help us"
    validations:
      required: false
